<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Tracker</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
    background: #12141c;
    color: #fff;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.3rem;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card {
    border-radius: 16px;
    padding: 20px 22px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    color: white;
  }
  .card-icon {
    font-size: 2rem;
    flex-shrink: 0;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-size: 1.4rem;
    font-weight: 700;
  }
  .card-sub {
    font-size: 1rem;
    font-weight: 500;
    opacity: 0.9;
    margin-top: 2px;
  }
  .feeding-card {
    background: linear-gradient(135deg, #ff7a45, #ff5722);
  }
  .link-card {
    background: #1e2330;
    border: 1px solid #2a3040;
  }
  .link-card .card-sub {
    color: #8b93a7;
    opacity: 1;
  }
  .chevron {
    font-size: 1.4rem;
    color: #8b93a7;
  }
</style>
</head>
<body>
  <h1>👶 Baby Tracker</h1>

  <div class="card feeding-card" id="last-feed-card">
    <div class="card-icon">🍼</div>
    <div class="card-body">
      <div class="card-title">Feeding</div>
      <div class="card-sub" id="feed-summary">Loading…</div>
    </div>
  </div>

  <a class="card link-card" href="feeding.html">
    <div class="card-icon">🍼</div>
    <div class="card-body">
      <div class="card-title" style="font-size:1.1rem;">Feeding Tracker</div>
      <div class="card-sub">Log a new feeding</div>
    </div>
    <div class="chevron">›</div>
  </a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://qkcpnqinxmealexfqowt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_mIw0qVK1aQKy4iXWA4UEBw_2Ibh_12N';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let lastEntry = null;

    function formatDuration(ms) {
      const totalMinutes = Math.floor(ms / 60000);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      if (hours <= 0) return `${minutes}m ago`;
      return `${hours}h ${minutes}m ago`;
    }

    function updateSummary() {
      const summaryEl = document.getElementById('feed-summary');
      if (!lastEntry) return;
      const timeAgo = formatDuration(Date.now() - new Date(lastEntry.time).getTime());
      const amount = lastEntry.amount != null ? `${lastEntry.amount}${lastEntry.unit || ''}` : lastEntry.type;
      summaryEl.textContent = `${timeAgo} · ${amount}`;
    }

    async function loadLastFeed() {
      const { data, error } = await supabaseClient
        .from('feedings')
        .select('*')
        .order('time', { ascending: false })
        .limit(1);

      const summaryEl = document.getElementById('feed-summary');

      if (error) {
        console.error(error);
        summaryEl.textContent = 'Error loading data';
        return;
      }

      if (!data || data.length === 0) {
        summaryEl.textContent = 'No feedings logged yet.';
        return;
      }

      lastEntry = data[0];
      updateSummary();
    }

    loadLastFeed();
    setInterval(updateSummary, 30000);
  </script>
</body>
</html>
